syntax = "proto3";

package validationtest;

import "buf/validate/validate.proto";
import "validationtest/import_test.proto";

message ExampleFieldRules {
  string regex_string_field = 1 [(buf.validate.field).string.pattern = "^[a-z0-9]{1,9}$"];
  string unconstrained = 2;
}

message ExampleOneofRules {
  // contact_info is the user's contact information
  oneof contact_info {
    // required ensures that exactly one field in oneof is set. Without this
    // option, at most one of email and phone_number is set.
    option (buf.validate.oneof).required = true;
    // email is the user's email
    string email = 1;
    // phone_number is the user's phone number.
    string phone_number = 2;
  }
  oneof unconstrained {
    string field3 = 3;
    string field4 = 4;
  }
}

message ExampleMessageRules {
  option (buf.validate.message).cel = {
    id: "secondary_email_depends_on_primary"
    expression:
      "has(this.secondary_email) && !has(this.primary_email)"
      "? 'cannot set a secondary email without setting a primary one'"
      ": ''"
  };
  string primary_email = 1;
  string secondary_email = 2;
}

message FieldExpressionMultiple {
  string val = 1 [
    (buf.validate.field).string.max_len = 5,
    (buf.validate.field).string.pattern = "^[a-z0-9]$"
  ];
}

message FieldExpressionMapInt32 {
  map<int32, int32> val = 1 [(buf.validate.field).cel = {
    id: "field_expression.map.int32"
    message: "all map values must equal 1"
    expression: "this.all(k, this[k] == 1)"
  }];
}

message ExampleImportMessage {
  option (buf.validate.message) = {
    cel: {
      id: "imported_submessage_must_not_be_null"
      expression: "this.imported_submessage != null"
    }
    cel: {
      id: "hex_string_must_not_be_empty"
      expression: "this.imported_submessage.hex_string != ''"
    }
  };
  ExampleImportedMessage imported_submessage = 1;
}

message ExampleImportMessageFieldRule {
  ExampleImportMessage message_with_import = 1 [
    (buf.validate.field).cel = {
      id: "field_must_not_be_null"
      expression: "this.imported_submessage != null"
    },
    (buf.validate.field).cel = {
      id: "field_string_must_not_be_empty"
      expression: "this.imported_submessage.hex_string != ''"
    }
  ];
}

message ExampleImportMessageInMap {
  option (buf.validate.message) = {
    cel: {
      id: "imported_submessage_must_not_be_null"
      expression: "this.imported_submessage[0] != null"
    }
    cel: {
      id: "hex_string_must_not_be_empty"
      expression: "this.imported_submessage[0].hex_string != ''"
    }
  };
  map<int64, ExampleImportedMessage> imported_submessage = 1;
}

message ExampleStringExtensions {
  string parent = 1;
  string path = 2;

  option (buf.validate.message).cel = {
    id: "path_matches_parent"
    message: "path must be a child of parent"
    expression:
      "this.path.lastIndexOf('/') >= 0 && "
      "this.path.substring(0, this.path.lastIndexOf('/')) == this.parent"
  };
}

message ExampleImportMessageInMapFieldRule {
  ExampleImportMessageInMap message_with_import = 1 [
    (buf.validate.field).cel = {
      id: "field_must_not_be_null"
      expression: "this.imported_submessage[0] != null"
    },
    (buf.validate.field).cel = {
      id: "field_string_must_not_be_empty"
      expression: "this.imported_submessage[0].hex_string != ''"
    }
  ];
}

message ExampleBoolConst {
  bool flag = 1 [(buf.validate.field).bool.const = true];
}

message ExampleInt32Const {
  int32 val = 1 [(buf.validate.field).int32.const = 5];
}

message ExampleInt32GtLt {
  int32 val = 1 [(buf.validate.field).int32 = {
    gt: 0
    lt: 10
  }];
}

message ExampleUint32Gt {
  // Threshold above Integer.MAX_VALUE — verifies unsigned comparison: a uint32 value of
  // 3000000000 must satisfy gt=2147483648, even though both render as negative when
  // interpreted as signed int.
  uint32 val = 1 [(buf.validate.field).uint32.gt = 2147483648];
}

message ExampleFloatFinite {
  float val = 1 [(buf.validate.field).float.finite = true];
}

message ExampleDoubleIn {
  double val = 1 [(buf.validate.field).double = {
    in: [
      1.5,
      2.5
    ]
  }];
}

enum ExampleColor {
  EXAMPLE_COLOR_UNSPECIFIED = 0;
  EXAMPLE_COLOR_RED = 1;
  EXAMPLE_COLOR_GREEN = 2;
  EXAMPLE_COLOR_BLUE = 3;
}

message ExampleEnumConst {
  ExampleColor val = 1 [(buf.validate.field).enum.const = 2];
}

message ExampleEnumIn {
  ExampleColor val = 1 [(buf.validate.field).enum = {
    in: [
      1,
      3
    ]
  }];
}

message ExampleBytesConst {
  bytes val = 1 [(buf.validate.field).bytes.const = "\x00\x99"];
}

message ExampleBytesPattern {
  bytes val = 1 [(buf.validate.field).bytes.pattern = "^[a-z]+$"];
}

message ExampleBytesIPv4 {
  bytes val = 1 [(buf.validate.field).bytes.ipv4 = true];
}

message ExampleStringConst {
  string val = 1 [(buf.validate.field).string.const = "abcd"];
}

message ExampleStringEmail {
  string val = 1 [(buf.validate.field).string.email = true];
}

message ExampleStringMinMaxLen {
  string val = 1 [(buf.validate.field).string = {
    min_len: 2
    max_len: 5
  }];
}

message ExampleStringHostAndPort {
  string val = 1 [(buf.validate.field).string.host_and_port = true];
}

message ExampleRepeatedMinMax {
  repeated int32 val = 1 [(buf.validate.field).repeated = {
    min_items: 2
    max_items: 5
  }];
}

message ExampleRepeatedUnique {
  repeated string val = 1 [(buf.validate.field).repeated.unique = true];
}

message ExampleMapMinMax {
  map<string, string> val = 1 [(buf.validate.field).map = {
    min_pairs: 1
    max_pairs: 3
  }];
}

// --- Float/double parity fixtures ---
//
// See NATIVE_RULES_REVIEW.md sections B1 (fixed) and B2 (reclassified). The tests in
// FloatBugConfirmationTest now lock in parity rather than confirm divergence.

// Originally documented the floatFormatter sign-strip bug; now used by the regression test
// asserting native and CEL both render -0.0 as "must equal -0".
message ExampleFloatConstNegZero {
  float val = 1 [(buf.validate.field).float.const = -0.0];
}

message ExampleDoubleConstNegZero {
  double val = 1 [(buf.validate.field).double.const = -0.0];
}

// Originally claimed a parity divergence on repeated.unique for floats/doubles. Investigation
// showed CustomOverload.uniqueList (the CEL-side impl in protovalidate-java) and
// RepeatedRulesEvaluator.isUnique both use HashSet + Object.equals, so they agree — both
// deviate from CEL's IEEE-754 spec for NaN and +/- 0 in the same direction. The agreement
// tests pin that contract until a coordinated fix lands.
message ExampleFloatRepeatedUnique {
  repeated float val = 1 [(buf.validate.field).repeated.unique = true];
}

message ExampleDoubleRepeatedUnique {
  repeated double val = 1 [(buf.validate.field).repeated.unique = true];
}

message FloatDoubleNaNNegZero {
  repeated float fvals = 1 [(buf.validate.field).repeated.unique = true];
  repeated double dvals = 2 [(buf.validate.field).repeated.unique = true];
  float fneg_zero = 3 [(buf.validate.field).float.const = -0.0];
  double dneg_zero = 4 [(buf.validate.field).double.const = -0.0];
}
